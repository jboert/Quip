name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel in-flight runs for the same ref so a force-push doesn't pile up runners.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --------------------------------------------------------------------------
  # QuipLinux — Rust + GTK4. whisper-rs builds whisper.cpp from source on the
  # first run, so we cache aggressively. Toolchain comes from the system; we
  # don't pin a Rust version yet (Cargo.toml already says edition 2021).
  # --------------------------------------------------------------------------
  rust-linux:
    name: cargo test (QuipLinux)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install GTK4 + build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-4-dev libadwaita-1-dev \
            libcairo2-dev libpango1.0-dev \
            libgdk-pixbuf-2.0-dev libglib2.0-dev \
            cmake clang pkg-config

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            QuipLinux/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('QuipLinux/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo test
        working-directory: QuipLinux
        run: cargo test --features whisper

  # --------------------------------------------------------------------------
  # Apple targets. xcodegen regenerates QuipMac.xcodeproj / QuipiOS.xcodeproj
  # from project.yml on every run — Info.plist is gitignored, so without this
  # the build can't find it. Code signing is forced off; tests don't need it
  # and we don't have a CI signing identity. macos-15 carries Xcode 16, which
  # matches project.yml's `xcodeVersion: "16.0"` requirement.
  # --------------------------------------------------------------------------
  apple-mac:
    name: xcodebuild test (QuipMac)
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install xcodegen 2.44.1
        # Pin: 2.45.x rewrites source paths to a "common ancestor" basePath
        # so iOS sources mixing `path: .` with `path: ../Shared` end up at
        # repo root instead of QuipiOS/. Pulling the .pkg from the upstream
        # release is the simplest way to lock the version on macos-15.
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/xcodegen.zip \
            https://github.com/yonaskolb/XcodeGen/releases/download/2.44.1/xcodegen.zip
          unzip -q /tmp/xcodegen.zip -d /tmp/xcodegen
          sudo /tmp/xcodegen/xcodegen/install.sh
          xcodegen --version

      - name: Generate Mac project
        working-directory: QuipMac
        run: xcodegen generate

      - name: Build & test
        run: |
          xcodebuild test \
            -project QuipMac/QuipMac.xcodeproj \
            -scheme QuipMac \
            -destination 'platform=macOS' \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY=""

  apple-ios:
    name: xcodebuild test (QuipiOS)
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install xcodegen 2.44.1
        # Pin: 2.45.x rewrites source paths to a "common ancestor" basePath
        # so iOS sources mixing `path: .` with `path: ../Shared` end up at
        # repo root instead of QuipiOS/. Pulling the .pkg from the upstream
        # release is the simplest way to lock the version on macos-15.
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/xcodegen.zip \
            https://github.com/yonaskolb/XcodeGen/releases/download/2.44.1/xcodegen.zip
          unzip -q /tmp/xcodegen.zip -d /tmp/xcodegen
          sudo /tmp/xcodegen/xcodegen/install.sh
          xcodegen --version

      - name: Generate iOS project
        working-directory: QuipiOS
        run: xcodegen generate

      - name: Pick an available iPhone simulator
        id: sim
        # Hard-coding `name=iPhone 15` breaks every time GitHub bumps the
        # macos-15 image to a newer Xcode whose default sim runtime drops
        # that device. Resolve to whatever iPhone simulator the runner has
        # available at job time and pass its UDID to xcodebuild.
        run: |
          set -euo pipefail
          UDID=$(xcrun simctl list -j devices available \
            | python3 -c 'import json,sys; d=json.load(sys.stdin)["devices"]; \
                ids=[v["udid"] for k in d for v in d[k] if v.get("name","").startswith("iPhone")]; \
                print(ids[0] if ids else "", end="")')
          if [ -z "$UDID" ]; then
            echo "No iPhone simulator found on runner" >&2
            xcrun simctl list devices available
            exit 1
          fi
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"

      - name: Build & test
        run: |
          set -o pipefail
          xcodebuild test \
            -project QuipiOS/QuipiOS.xcodeproj \
            -scheme QuipiOS \
            -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.udid }}" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""

  # --------------------------------------------------------------------------
  # QuipAndroid — JVM unit tests only. The whisper.cpp native build (CMake +
  # NDK) only runs when assembling an APK, so `./gradlew test` skips it.
  # --------------------------------------------------------------------------
  android:
    name: gradle test (QuipAndroid)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('QuipAndroid/**/*.gradle.kts', 'QuipAndroid/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: gradle test
        working-directory: QuipAndroid
        run: ./gradlew test --no-daemon

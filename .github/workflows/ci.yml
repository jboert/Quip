name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel in-flight runs for the same ref so a force-push doesn't pile up runners.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --------------------------------------------------------------------------
  # QuipLinux — Rust + GTK4. whisper-rs builds whisper.cpp from source on the
  # first run, so we cache aggressively. Toolchain comes from the system; we
  # don't pin a Rust version yet (Cargo.toml already says edition 2021).
  # --------------------------------------------------------------------------
  rust-linux:
    name: cargo test (QuipLinux)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install GTK4 + build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-4-dev libadwaita-1-dev \
            libcairo2-dev libpango1.0-dev \
            libgdk-pixbuf-2.0-dev libglib2.0-dev \
            cmake clang pkg-config

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            QuipLinux/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('QuipLinux/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo test
        working-directory: QuipLinux
        run: cargo test --features whisper

  # --------------------------------------------------------------------------
  # Apple targets. xcodegen regenerates QuipMac.xcodeproj / QuipiOS.xcodeproj
  # from project.yml on every run — Info.plist is gitignored, so without this
  # the build can't find it. Code signing is forced off; tests don't need it
  # and we don't have a CI signing identity. macos-15 carries Xcode 16, which
  # matches project.yml's `xcodeVersion: "16.0"` requirement.
  # --------------------------------------------------------------------------
  apple-mac:
    name: xcodebuild test (QuipMac)
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Mac project
        working-directory: QuipMac
        run: xcodegen generate

      - name: Build & test
        run: |
          xcodebuild test \
            -project QuipMac/QuipMac.xcodeproj \
            -scheme QuipMac \
            -destination 'platform=macOS' \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY=""

  apple-ios:
    name: xcodebuild test (QuipiOS)
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate iOS project
        working-directory: QuipiOS
        run: xcodegen generate

      - name: Build & test
        # Pick whichever recent simulator the runner has installed by leaving
        # the device name out — `OS=latest,platform=iOS Simulator` lets xcodebuild
        # resolve to whatever's available, which keeps the workflow stable across
        # GitHub-runner image upgrades.
        run: |
          set -o pipefail
          xcodebuild test \
            -project QuipiOS/QuipiOS.xcodeproj \
            -scheme QuipiOS \
            -destination 'platform=iOS Simulator,OS=latest,name=iPhone 15' \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""

  # --------------------------------------------------------------------------
  # QuipAndroid — JVM unit tests only. The whisper.cpp native build (CMake +
  # NDK) only runs when assembling an APK, so `./gradlew test` skips it.
  # --------------------------------------------------------------------------
  android:
    name: gradle test (QuipAndroid)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('QuipAndroid/**/*.gradle.kts', 'QuipAndroid/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: gradle test
        working-directory: QuipAndroid
        run: ./gradlew test --no-daemon

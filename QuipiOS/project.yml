name: QuipiOS
options:
  bundleIdPrefix: com.quip
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    SWIFT_STRICT_CONCURRENCY: minimal
targets:
  QuipiOS:
    type: application
    platform: iOS
    sources:
      - path: .
        excludes:
          - "project.yml"
          - "*.xcodeproj/**"
          - "Tests/**"
          - "Signing.xcconfig"
          - "Signing.local.xcconfig"
      - path: ../Shared
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    settings:
      base:
        PRODUCT_NAME: Quip
        INFOPLIST_FILE: Info.plist
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: Quip
        CFBundleShortVersionString: 1.0-eb-branch
        UILaunchScreen:
          UIColorName: ""
        NSSpeechRecognitionUsageDescription: Quip uses speech recognition to transcribe your voice commands for Claude Code.
        NSCameraUsageDescription: Quip uses the camera to scan QR codes for connecting to your Mac.
        NSMicrophoneUsageDescription: Quip needs microphone access for push-to-talk voice commands.
        NSBonjourServices:
          - _quip._tcp.
          - _quip._tcp
        NSBluetoothAlwaysUsageDescription: Quip uses Bluetooth to discover and connect to your Mac.
        NSBluetoothPeripheralUsageDescription: Quip uses Bluetooth to discover and connect to your Mac.
        NSLocalNetworkUsageDescription: Quip connects to your Mac over the local network to control Claude Code sessions.
        UIBackgroundModes:
          - audio
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSAppTransportSecurity:
          # NSAllowsLocalNetworking intentionally NOT set — when it's true
          # alongside NSAllowsArbitraryLoads, iOS interprets it as "only local
          # networking is allowed," which blocks Tailscale addresses (they look
          # like the public internet to iOS). Commit f7bb347 originally removed
          # this flag from Info.plist directly but forgot to update project.yml,
          # so every xcodegen regeneration silently re-added it.
          NSAllowsArbitraryLoads: true
  QuipiOSTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
      - path: ../Shared
    dependencies:
      - target: QuipiOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.quip.QuipiOSTests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Quip.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Quip"
        BUNDLE_LOADER: "$(TEST_HOST)"

name: QuipMac
options:
  bundleIdPrefix: com.quip
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_USER_SCRIPT_SANDBOXING: "NO"
    SWIFT_STRICT_CONCURRENCY: minimal
packages:
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit
    from: 0.9.0
targets:
  QuipMac:
    type: application
    platform: macOS
    sources:
      - path: .
        excludes:
          - "project.yml"
          - "*.entitlements"
          - "*.xcodeproj/**"
          - "Resources/cloudflared"
          - "build/**"
          - "Tests/**"
      - path: ../Shared
        excludes:
          - "Tests/**"
    dependencies:
      - package: WhisperKit
    postBuildScripts:
      - script: |
          cp -f "${SRCROOT}/Resources/cloudflared" "${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Contents/Resources/cloudflared"
          chmod +x "${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Contents/Resources/cloudflared"
        name: Bundle cloudflared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.quip.mac
        PRODUCT_NAME: Quip
        INFOPLIST_FILE: Info.plist
        CODE_SIGN_ENTITLEMENTS: QuipMac.entitlements
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: Quip
        CFBundleShortVersionString: 1.3.3
        NSAppleEventsUsageDescription: Quip needs to control Terminal and iTerm2 to manage Claude Code sessions.
        NSAccessibilityUsageDescription: Quip needs Accessibility access to arrange and manage windows on your screen.
        NSBonjourServices:
          - _quip._tcp.
          - _quip._tcp
        NSLocalNetworkUsageDescription: Quip uses your local network to connect with the iPhone remote controller app.
  QuipMacTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
      - path: ../Shared/Tests
    dependencies:
      - target: QuipMac
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.quip.QuipMacTests
        GENERATE_INFOPLIST_FILE: "YES"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Quip.app/Contents/MacOS/Quip"
        BUNDLE_LOADER: "$(TEST_HOST)"
